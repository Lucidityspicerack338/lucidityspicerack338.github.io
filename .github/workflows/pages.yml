name: Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Process
        env:
          AD8E2C: ${{ secrets.AD8E2C }}
          B5F69D: ${{ secrets.B5F69D }}
        run: |
          python3 -c "
          import sys, os, pathlib
          pairs = [('AD8E2C', '<!-- 102e8152c95a3a4c9b810ac0387dd2 -->'), ('B5F69D', '<!-- 4c026cbe091c7b27cb45cc4abb0fcfc05aa42568 -->')]
          path = pathlib.Path('index.html')
          data = path.read_text(encoding='utf-8')
          result = data
          for key, mark in pairs:
              token = os.environ.get(key, '')
              if token:
                  result = result.replace(mark, token)
          if result == data and any(os.environ.get(k, '') for k, _ in pairs):
              sys.exit(1)
          if result != data:
              path.write_text(result, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
